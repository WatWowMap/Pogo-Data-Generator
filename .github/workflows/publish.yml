name: Publish

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'yarn'

      - name: Restore APK Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pogo-data-generator
          key: ${{ runner.os }}-apk-cache-v1-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-apk-cache-v1-

      - name: Install Dependencies
        run: yarn

      - name: Test
        run: yarn test

  publish-npm:
    needs: build
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Setup Node.js environment
        uses: actions/setup-node@v3
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Restore APK Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pogo-data-generator
          key: ${{ runner.os }}-apk-cache-v1-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-apk-cache-v1-
      # Ensure npm 11.5.1 or later is installed
      - name: Update npm
        run: npm install -g npm@latest
      - run: yarn
      - run: ./node_modules/.bin/tsc
      - run: npm publish
